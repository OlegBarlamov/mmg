# ============================================================
# Galaxy Generation Configuration
# Each layer has up to two sub-sections:
#   node:       — properties of the layer node itself
#   generation: — constants used by the DetailsGenerator
# ============================================================

# Layer 0 — World map cell (top-level spatial grid)
# Generator: WorldMapCellContentDetailsGenerator
mapCell:
  node:
    cellSize: 5000                    # world-units per cell side
    unwrapDistanceMultiplier: 4       # × cellSize
    octreeDepth: 10
  generation:
    temperatureMin: 1000              # Kelvin, coolest galaxies (reddish)
    temperatureMax: 10000             # Kelvin, hottest galaxies (bluish)
    powerMin: 0.3                     # min galaxy power (affects size, star count)
    powerMax: 1.0
  debug:
    singleGalaxy: false               # true = spawn one galaxy for testing
    position: [-1000, 10, 10]
    temperature: 6000
    power: 0.8

# Layer 1 — Galaxies batch (groups galaxies inside a cell)
# Generator: GalaxiesBatchDetailsGenerator
galaxiesBatch:
  node:
    unwrapDistanceMultiplier: 1.5     # × cellSize
    octreeSizeMultiplier: 1.5         # × cellSize
    baseGalaxyHalfSize: 30            # billboard half-size for distant galaxies

# Layer 2 — Galaxy as point (single galaxy, generates spiral structure)
# Generator: GalaxyAsPointDetailsGenerator
galaxyAsPoint:
  node:
    unwrapDistance: 2000              # absolute distance to reveal texture layer
    octreeSize: 100
    visualScaleMultiplier: 150        # billboard scale = power × this
  generation:
    baseArmCount: 2                   # armCount = base + power × scale
    armCountPowerScale: 4
    baseDiskRadius: 20                # diskRadius = base + power × scale
    diskRadiusPowerScale: 40
    baseClusterCount: 300            # clusterCount = base + power × scale
    clusterCountPowerScale: 1500      # max ~10 000 initial stars
    scatterScaleMin: 0.5              # scatter lerp(max→min, power)
    scatterScaleMax: 1.5
    diskThicknessRatio: 0.05          # Y spread as fraction of diskRadius
    spiralWindFactor: 1.5             # how tightly arms wind
    radialExtentFactor: 0.9           # radial reach as fraction of diskRadius
    radialPowerExponent: 0.7          # controls center concentration (0.5 = uniform, 1.0 = mild, 2.0 = heavy)
    baseLuminosityScale: 0.3
    luminosityPowerScale: 2.0
    luminosityRandomBase: 0.5
    temperatureBlend: 0.4             # blend toward galaxy-wide temperature

# Layer 3 — Galaxy texture farthest (expands clusters, partitions into sectors)
# Generator: GalaxyTextureFarthestDetailsGenerator
galaxyTextureFarthest:
  node:
    unwrapDistanceMultiplier: 15      # × diskRadius
    octreeSizeMultiplier: 1           # × diskRadius
    textureBrightnessScale: 0.15      # multiplier on per-star brightness in texture
    textureStarAlpha: 30              # alpha added per star to the texture (0–255)
    textureStarRadius: 1              # pixel radius per star (0 = single pixel)
    textureBlurRadius: 0              # no blur at 64x64 — star radius alone is enough
    diffuseDiskBrightness: 0.03       # faint disk underlay brightness
    diffuseDiskAlpha: 15              # faint disk underlay alpha (0–255)
    diffuseDiskExtent: 0.85           # disk extent as fraction of texture radius
    bulgeExtent: 0.35                 # bulge radius as fraction of texture center
    bulgeIntensity: 0.15              # bulge color intensity
    bulgeAlphaScale: 60               # bulge alpha scale (0–255)
    centerStarIntensity: 0.75          # shader intensity for the central star billboard
    centerStarScaleMultiplier: 1.25    # scale = diskRadius × this
  generation:
    subClustersPerPoint: 4            # extra sub-stars spawned per cluster point
    subClusterSpread: 0.04            # spread as fraction of diskRadius
    subClusterLuminosityScale: 0.4    # sub-star luminosity relative to parent

# Layer 4 — Galaxy texture layered (intermediate texture LOD, per-sector view)
# Generator: GalaxyTextureLayeredDetailsGenerator
galaxyTextureLayered:
  node:
    unwrapDistanceMultiplier: 7       # × diskRadius
    octreeSizeMultiplier: 3           # × diskRadius (must be ≥ 2√2 ≈ 2.83 to fit rotated corner sectors)
    textureBrightnessScale: 1.0       # multiplier on per-star brightness in texture
    textureStarAlpha: 50              # alpha added per star to the texture (0–255)
    textureStarRadius: 2              # pixel radius per star (0 = single pixel)
    textureBlurRadius: 2              # Gaussian blur radius (pixels) after star render
    diffuseDiskBrightness: 0.12       # faint disk underlay brightness
    diffuseDiskAlpha: 60              # faint disk underlay alpha (0–255)
    diffuseDiskExtent: 0.85           # disk extent as fraction of texture radius
    bulgeExtent: 0.4                  # bulge radius as fraction of texture center
    bulgeIntensity: 0.4               # bulge color intensity
    bulgeAlphaScale: 140              # bulge alpha scale (0–255)
    centerStarIntensity: 0.5          # shader intensity for the central star billboard
    centerStarScaleMultiplier: 1.0    # scale = diskRadius × this
  generation:
    sectorGridSize: 5                 # NxN grid for sector partitioning
    subClustersPerPoint: 4            # extra sub-stars spawned per sector point
    subClusterSpread: 0.2            # spread as fraction of sectorRadius
    subClusterLuminosityScale: 0.4    # sub-star luminosity relative to parent

# Layer 5 — Galaxy sector texture (per-sector texture before dots)
# Generator: GalaxySectorTextureDetailsGenerator
galaxySectorTexture:
  node:
    unwrapDistanceMultiplier: 3       # × diskRadius
    octreeSizeMultiplier: 3           # × sectorRadius
    cloudSpriteRadius: 0.022          # per-star sprite radius as fraction of sectorRadius
    cloudSpriteBrightness: 1.2        # per-star sprite brightness
    cloudYScale: 2.0                  # vertical exaggeration of cloud sprite positions
    cloudGalaxyTintBlend: 0.3         # blend toward galaxy color (0 = temperature only, 1 = galaxy tint only)
    slabBrightness: 0.8               # raymarched slab brightness (background glow)
    slabFalloffSharpness: 10.0        # vertical density falloff sharpness
    slabThicknessScale: 5.0           # Y-scale multiplier for the bounding box
    slabEdgeFadeStart: 0.35           # radial distance (0–0.5 in object space) where edge fade begins
  generation:
    diskThicknessScale: 2.5           # Y-axis exaggeration for 3D feel

# Layer 6 — Galaxy sector (adaptive quadtree split into chunks)
# Generator: GalaxySectorDetailsGenerator
galaxySector:
  node:
    unwrapDistanceMultiplier: 6       # × sectorRadius
    octreeSizeMultiplier: 3           # × sectorRadius
    dotBaseRadius: 0.05               # minimum dot radius (world units)
    dotRadiusScale: 0.08              # additional radius per unit of luminosity
    dotBaseBrightness: 0.5            # minimum brightness multiplier
    dotBrightnessScale: 1.0           # additional brightness per unit of luminosity
    dotEdgeBrightness: 0.25           # edge color as fraction of center color
  generation:
    maxPointsPerChunk: 300            # split threshold
    maxSplitDepth: 5

# Layer 7 — Galaxy sector chunk (further split into star batches)
# Generator: GalaxySectorChunkDetailsGenerator
galaxySectorChunk:
  node:
    unwrapDistanceMultiplier: 1    # × sectorRadius (consistent across all chunk depths)
    octreeSizeMultiplier: 3          # × chunkRadius (3D extent)
    dotBaseRadius: 0.03
    dotRadiusScale: 0.05
    dotBaseBrightness: 0.3
    dotBrightnessScale: 0.7
    dotEdgeBrightness: 0.15
    densityDampingReference: 30       # star count at which brightness = 100%; more stars → dimmer
  generation:
    maxPointsPerBatch: 50             # split threshold
    maxSplitDepth: 3

# Layer 8 — Star systems batch (group of individual stars)
# Generator: StarSystemsBatchDetailsGenerator
starSystemsBatch:
  node:
    unwrapDistanceMultiplier: 0.5     # × sectorRadius
    octreeSizeMultiplier: 2.5         # × computed max extent
    dotBaseRadius: 0.015
    dotRadiusScale: 0.01
    dotBaseBrightness: 0.5
    dotBrightnessScale: 0.9
    dotBrightnessMin: 0.3
    dotBrightnessMax: 1.0
    dotGlowAlphaScale: 0.4           # glow alpha = brightness × this
    dotGlowRadiusScale: 2.0          # glow radius = coreRadius × this

# Layer 9 — Star system as point (individual star dot, intermediate LOD)
# Generator: StarSystemAsPointDetailsGenerator
starSystemAsPoint:
  node:
    unwrapDistance: 2.0               # distance to unwrap into full light point
    dotBaseRadius: 0.015              # minimum dot radius (world units)
    dotRadiusScale: 0.025             # additional radius per unit of luminosity
    dotBaseBrightness: 0.5
    dotBrightnessScale: 0.9
    dotEdgeBrightness: 0.2            # edge color as fraction of center color

# Layer 10 — Star system as light point (full billboard star, future star system)
# Generator: StarSystemAsLightPointDetailsGenerator
starSystemAsLightPoint:
  node:
    visualScaleMultiplier: 0.4        # billboard scale = luminosity × this
    brightnessMultiplier: 0.8         # material brightness = luminosity × this
    brightnessMin: 0.3                # clamp range
    brightnessMax: 1.0
